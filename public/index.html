<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴蒂酒吧 🍶</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    color: #e0d6c8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: #16213e;
    padding: 12px 20px;
    border-bottom: 1px solid #e94560;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #header h1 { font-size: 18px; color: #e94560; }
  #status { font-size: 12px; color: #888; margin-left: auto; }
  #status.connected { color: #4ade80; }
  #main { flex: 1; display: flex; overflow: hidden; }
  #sidebar {
    width: 200px;
    background: #0f3460;
    border-right: 1px solid #e94560;
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .seat-section { margin-bottom: 16px; }
  .seat-section h3 { font-size: 12px; color: #e94560; margin-bottom: 6px; }
  .seat {
    padding: 6px 10px;
    margin-bottom: 4px;
    border-radius: 4px;
    font-size: 13px;
    background: #16213e;
    border: 1px solid #333;
  }
  .seat.empty { opacity: 0.4; font-style: italic; }
  .seat .name { color: #e0d6c8; }
  .seat .name.bartender { color: #fbbf24; }
  #chat-area { flex: 1; display: flex; flex-direction: column; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 80%;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: #888;
    font-size: 12px;
    font-style: italic;
    max-width: 100%;
    text-align: center;
    padding: 4px;
  }
  .msg.other {
    align-self: flex-start;
    background: #16213e;
    border: 1px solid #333;
    border-bottom-left-radius: 4px;
  }
  .msg.self {
    align-self: flex-end;
    background: #e94560;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg .from { font-size: 11px; color: #e94560; margin-bottom: 3px; font-weight: bold; }
  .msg.self .from { color: #fca5a5; }
  .msg .time { font-size: 10px; color: #666; margin-top: 3px; text-align: right; }
  #input-bar {
    padding: 10px 16px;
    background: #16213e;
    border-top: 1px solid #333;
    display: flex;
    gap: 8px;
  }
  #input-bar input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #333;
    background: #0f3460;
    color: #e0d6c8;
    font-size: 14px;
    outline: none;
  }
  #input-bar input:focus { border-color: #e94560; }
  #input-bar button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #e94560;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  #input-bar button:hover { background: #ff6b8a; }
  .drink-btn {
    font-size: 11px;
    padding: 3px 8px;
    background: #0f3460;
    border: 1px solid #e94560;
    color: #e0d6c8;
    border-radius: 10px;
    cursor: pointer;
    margin-left: 6px;
  }
  @media (max-width: 600px) {
    #sidebar { display: none; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:22px">🍶</span>
  <h1>巴蒂酒吧</h1>
  <span id="status">连接中...</span>
</div>

<div id="main">
  <div id="sidebar">
    <div class="seat-section">
      <h3>🍺 吧台</h3>
      <div class="seat" id="seat-bartender"><span class="name bartender">🍺 酒保（在线）</span></div>
      <div class="seat empty" id="seat-guest-0">空位</div>
      <div class="seat empty" id="seat-guest-1">空位</div>
    </div>
    <div class="seat-section">
      <h3>🛋️ 卡座 A</h3>
      <div class="seat empty">施工中...</div>
    </div>
    <div class="seat-section">
      <h3>📖 提示</h3>
      <div style="font-size:11px;color:#888;line-height:1.6">
        说「酒保」呼叫酒保<br>
        多喝会醉（暂无）<br>
        当前版本：MVP 0.1
      </div>
    </div>
  </div>

  <div id="chat-area">
    <div id="messages"></div>
    <div id="input-bar">
      <input id="msg-input" type="text" placeholder="说点什么..." autocomplete="off">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
let ws = null;
let myName = '';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const statusEl = document.getElementById('status');

function addMsg(type, text, from, time) {
  const div = document.createElement('div');
  if (type === 'system') {
    div.className = 'msg system';
    div.textContent = text;
  } else {
    const isSelf = from === myName;
    div.className = 'msg ' + (isSelf ? 'self' : 'other');
    div.innerHTML = `<div class="from">${from}</div><div>${escHtml(text)}</div>${time ? '<div class="time">'+time+'</div>' : ''}`;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', text }));
  inputEl.value = '';
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    statusEl.textContent = '已连接 ✅';
    statusEl.className = 'connected';
  };

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === 'system') {
      addMsg('system', msg.text);
      // 提取自己的名字
      const m = msg.text.match(/你是 (\w+)/);
      if (m) myName = m[1];
    } else if (msg.type === 'chat') {
      addMsg('chat', msg.text, msg.from, msg.time);
    } else if (msg.type === 'seats') {
      updateSeats(msg.seats);
    }
  };

  ws.onclose = () => {
    statusEl.textContent = '断开，重连中...';
    statusEl.className = '';
    setTimeout(connect, 3000);
  };
}

function updateSeats(seats) {
  // seats: { seatId: name||null }
  for (const [id, name] of Object.entries(seats)) {
    const el = document.getElementById('seat-' + id);
    if (!el) continue;
    if (name) {
      el.className = 'seat';
      el.innerHTML = `<span class="name">${name}</span>`;
    } else {
      el.className = 'seat empty';
      el.textContent = '空位';
    }
  }
}

connect();
</script>
</body>
</html>
